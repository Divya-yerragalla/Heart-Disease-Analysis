<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us</title>

<style>

body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background-color:#f8f5f2;
}


/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 80px;
background:white;
box-shadow:0px 2px 8px rgba(0,0,0,0.05);
}

.logo{
font-size:28px;
font-weight:bold;
color:#2b1d16;
}


/* NAVBAR BUTTONS */

nav{
margin-left:auto;
}

nav a{

margin:0 10px;
text-decoration:none;
color:white;
font-size:16px;
background:#e85d2a;
padding:10px 18px;
border-radius:25px;
display:inline-block;

}

nav a:hover{
background:#cf4c1f;
}



/* TITLE */

.title{

text-align:center;
padding:40px;

}

.title h1{

font-size:45px;
color:#2b1d16;

}

.title p{

font-size:18px;
color:#666;

}



/* CONTACT FORM */

.form-box{

width:40%;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0px 4px 12px rgba(0,0,0,0.1);

}


input, textarea{

width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;

}


button{

background:#e85d2a;
color:white;
border:none;
padding:12px 20px;
font-size:16px;
border-radius:25px;
cursor:pointer;
width:100%;

}


button:hover{

background:#cf4c1f;

}



/* FOOTER */

footer{

background:#2b1d16;
color:white;
text-align:center;
padding:20px;
margin-top:50px;

}

</style>

</head>



<body>


<header>

<div class="logo">
HeartCare
</div>


<nav>

<a href="/">Home</a>

<a href="/dashboards">Dashboards</a>

<a href="/story">Story</a>

<a href="/contact">Contact Us</a>

<a href="/about">About Us</a>

</nav>

</header>



<div class="title">

<h1>Contact Us</h1>

<p>

If you have any questions or feedback about our project, feel free to contact us.

</p>

</div>



<div class="form-box">


<form>

<label>Name</label>
<input type="text" placeholder="Enter your name">


<label>Email</label>
<input type="email" placeholder="Enter your email">


<label>Message</label>
<textarea rows="5" placeholder="Enter your message"></textarea>


<button type="submit">

Send Message

</button>


</form>


</div>



<footer>

Heart Disease Analysis Project © 2026

</footer>



</body>

</html>
